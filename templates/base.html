<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Carga de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fuente Inter y Manrope (Para igualar tu diseño) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

    <title>{% block title %}Nexthora{% endblock %}</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'display': ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        blue: {
                            50: '#f3f3fe',
                            100: '#e1e2ed',
                            500: '#2563eb',
                            600: '#004ac6', 
                            700: '#003ea8', 
                        },
                        gray: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            600: '#4B5563',
                            900: '#111827',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans antialiased text-gray-900 flex min-h-screen">

    <!-- MENÚ DE NAVEGACIÓN (Solo visible si el usuario inició sesión) -->
    {% if user.is_authenticated %}
    
    <!-- 1. SIDEBAR DESKTOP (Menú Lateral) -->
    <nav class="hidden md:flex flex-col h-screen py-6 bg-white border-r border-gray-200 fixed left-0 w-64 z-40">
        <!-- Logo -->
        <div class="px-6 mb-8">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-lg font-display">
                    N
                </div>
                <div>
                    <div class="text-lg font-black text-blue-600 tracking-tight font-display">Nexthora</div>
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Professional Suite</div>
                </div>
            </div>
        </div>

        <!-- Links Principales -->
        <div class="flex-1 px-4 space-y-1.5">
            <!-- Dashboard -->
            <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium transition-colors {% if request.resolver_match.url_name == 'dashboard' %}bg-blue-50 text-blue-700 border-r-4 border-blue-600{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboard
            </a>
            <!-- Mi Agenda -->
            <a href="{% url 'appointments' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium transition-colors {% if request.resolver_match.url_name == 'appointments' %}bg-blue-50 text-blue-700 border-r-4 border-blue-600{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Agenda
            </a>
            <!-- Servicios -->
            <a href="{% url 'services' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium transition-colors {% if request.resolver_match.url_name == 'services' %}bg-blue-50 text-blue-700 border-r-4 border-blue-600{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                Servicios
            </a>
            <!-- Horario/Configuración -->
            <a href="{% url 'schedule' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg font-medium transition-colors {% if request.resolver_match.url_name == 'schedule' %}bg-blue-50 text-blue-700 border-r-4 border-blue-600{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Horarios
            </a>
        </div>

        <!-- Botón Inferior -->
        <div class="px-4 mt-auto">
            <a href="{% url 'services' %}" class="w-full bg-blue-600 text-white py-2.5 px-4 rounded-lg font-bold text-sm flex items-center justify-center gap-2 hover:bg-blue-700 transition-colors shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Nuevo Servicio
            </a>
        </div>
    </nav>

    <!-- 2. NAVBAR MOBILE (Menú Inferior en Celulares) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
        <a href="{% url 'dashboard' %}" class="flex flex-col items-center justify-center w-full h-full {% if request.resolver_match.url_name == 'dashboard' %}text-blue-600{% else %}text-gray-400 hover:text-gray-600{% endif %}">
            <svg class="w-6 h-6 mb-1" fill="{% if request.resolver_match.url_name == 'dashboard' %}currentColor{% else %}none{% endif %}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold font-display">Inicio</span>
        </a>
        <a href="{% url 'appointments' %}" class="flex flex-col items-center justify-center w-full h-full {% if request.resolver_match.url_name == 'appointments' %}text-blue-600{% else %}text-gray-400 hover:text-gray-600{% endif %}">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold font-display">Agenda</span>
        </a>
        <a href="{% url 'services' %}" class="flex flex-col items-center justify-center w-full h-full {% if request.resolver_match.url_name == 'services' %}text-blue-600{% else %}text-gray-400 hover:text-gray-600{% endif %}">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span class="text-[10px] font-bold font-display">Servicios</span>
        </a>
        <a href="{% url 'schedule' %}" class="flex flex-col items-center justify-center w-full h-full {% if request.resolver_match.url_name == 'schedule' %}text-blue-600{% else %}text-gray-400 hover:text-gray-600{% endif %}">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] font-bold font-display">Horario</span>
        </a>
    </nav>

    {% endif %}

    <!-- CONTENEDOR PRINCIPAL -->
    <!-- Si el usuario está logueado, le damos margen izquierdo (md:ml-64) en PC y padding inferior (pb-20) en Móvil -->
    <div class="flex-1 flex flex-col min-h-screen {% if user.is_authenticated %}md:ml-64 pb-20 md:pb-0{% endif %} w-full transition-all duration-300">
        
        <!-- Bloque para mensajes flash (éxito/error) -->
        <div class="w-full max-w-6xl mx-auto mt-6 px-4">
            {% if messages %}
            {% for message in messages %}
            <div class="p-4 mb-4 text-sm rounded-lg font-medium border shadow-sm flex items-center gap-2
                {% if message.tags == 'success' %}bg-green-50 text-green-700 border-green-200
                {% elif message.tags == 'error' %}bg-red-50 text-red-700 border-red-200
                {% else %}bg-blue-50 text-blue-700 border-blue-200{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
        </div>

        <!-- Aquí es donde se inyectará el contenido del Dashboard, Servicios, etc. -->
        <main class="flex-1 w-full">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>

</html>
