{% extends "base.html" %}

{% block title %}Iniciar Sesión - Nexthora{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] py-10">
    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-xl border border-gray-200">

        <div class="text-center">
            <h2 class="text-3xl font-bold text-gray-900">Bienvenido</h2>
            <p class="mt-2 text-gray-500">Ingresa a tu cuenta para gestionar tu agenda.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <!-- Usuario -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-900">Nombre de Usuario</label>
                <input type="text" name="username" id="username" required
                    class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <!-- Contraseña -->
            <div>
                <div class="flex justify-between items-center">
                    <label for="password" class="block text-sm font-medium text-gray-900">Contraseña</label>
                </div>
                <input type="password" name="password" id="password" required
                    class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <!-- Botón -->
            <button type="submit"
                class="w-full px-4 py-2 text-lg text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-all font-semibold shadow-sm active:scale-95">
                Entrar
            </button>
        </form>

        <!-- Link a Registro -->
        <p class="text-sm text-center text-gray-500">
            ¿No tienes cuenta?
            <a href="{% url 'register' %}" class="font-medium text-blue-600 hover:text-blue-700 transition-colors">Regístrate gratis</a>
        </p>
    </div>
</div>
{% endblock %}
