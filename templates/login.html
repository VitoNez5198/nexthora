{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar Sesión - Nexthora{% endblock %}

{% block content %}
<!-- Contenedor principal con fondo gris claro -->
<div class="flex flex-col items-center justify-center min-h-[85vh] py-10 px-4 sm:px-6 lg:px-8">
    
    <!-- Sección de Logotipo y Titulo -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md mb-8 text-center">
        <!-- Logotipo agrandado (cambié de h-12 a h-16) -->
        <img src="{% static 'logo.webp' %}" alt="Nexthora Logo" class="mx-auto h-16 w-auto object-contain">
        
        <h2 class="mt-6 text-3xl font-bold text-gray-900 font-display tracking-tight">Bienvenido de vuelta</h2>
        <p class="mt-2 text-sm text-gray-500">Ingresa a tu cuenta profesional para gestionar tu agenda.</p>
    </div>

    <!-- Tarjeta del Formulario -->
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-gray-100">

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <!-- Usuario -->
            <div>
                <label for="username" class="block text-sm font-bold text-gray-700 uppercase tracking-wide mb-1.5">Nombre de Usuario</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <input type="text" name="username" id="username" required
                        class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 outline-none transition-all text-gray-900 bg-gray-50 focus:bg-white">
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 uppercase tracking-wide mb-1.5">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <input type="password" name="password" id="password" required
                        class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 outline-none transition-all text-gray-900 bg-gray-50 focus:bg-white">
                </div>
            </div>

            <!-- Botón de Ingreso -->
            <button type="submit"
                class="w-full px-4 py-3 text-base text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition-all font-bold shadow-md shadow-blue-600/20 active:scale-95 flex justify-center items-center gap-2">
                Entrar al Dashboard
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

    </div>

    <!-- Link a Registro -->
    <p class="mt-8 text-sm text-center text-gray-500 font-medium">
        ¿Aún no eres parte de Nexthora?
        <a href="{% url 'register' %}" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">Regístrate gratis</a>
    </p>

</div>
{% endblock %}
